<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accès Clean — Nettoyage professionnel à Bruxelles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    /* Brand palette — #1a6599 (deep blue), #1dacf3 (sky), #2d8f7f (mint) */
    --ink: #0f3a63;
    --ink-soft: #1a6599;
    --ink-mute: #6b7e93;
    --ink-faint: #9aa8ba;
    --paper: #ffffff;
    --paper-2: #f3f8fc;
    --paper-3: #e4eef6;
    --accent: #2d8f7f;
    --accent-soft: #dcece8;
    --accent-deep: #1a5c52;
    --blue: #1a6599;
    --blue-soft: #d3e2ee;
    --blue-deep: #0f4670;
    --sky: #1dacf3;
    --sky-soft: #d6effd;
    --sky-deep: #0b7ab8;
    --leaf: #7aa95c;
    --sun: #e8b84a;
    --line: rgba(11, 25, 41, 0.08);
    --line-2: rgba(11, 25, 41, 0.14);

    --radius-sm: 6px;
    --radius: 14px;
    --radius-lg: 24px;
    --radius-xl: 32px;

    --shadow-sm: 0 1px 2px rgba(11,25,41,0.05);
    --shadow: 0 10px 30px -12px rgba(11,25,41,0.15);
    --shadow-lg: 0 30px 60px -20px rgba(11,25,41,0.18);

    --font-sans: 'Manrope', system-ui, -apple-system, sans-serif;
    --font-serif: 'Instrument Serif', Georgia, serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  [data-palette="premium"] {
    --ink: #0a1526;
    --paper: #f6f4ee;
    --paper-2: #ece8dc;
    --paper-3: #ddd7c5;
    --accent: #c49a3d;
    --accent-soft: #ede2c0;
    --accent-deep: #876717;
    --blue: #13294d;
    --blue-soft: #d3dae9;
    --blue-deep: #0a1a38;
    --leaf: #8a7a3c;
  }

  [data-palette="soft"] {
    --ink: #1a2a3a;
    --paper: #fafcfc;
    --paper-2: #eef5f4;
    --paper-3: #dfece9;
    --accent: #6fb5a9;
    --accent-soft: #e4f1ee;
    --accent-deep: #2f7d71;
    --blue: #6c8fc7;
    --blue-soft: #e4ecf8;
    --blue-deep: #3a5a93;
    --leaf: #9bbf7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  ::selection { background: var(--sky); color: var(--ink); }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }

  @media (max-width: 720px) {
    .container { padding: 0 20px; }
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-deep);
  }

  .serif { font-family: var(--font-serif); font-weight: 400; letter-spacing: -0.01em; }

  h1, h2, h3, h4 {
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.05;
    text-wrap: balance;
  }

  p { text-wrap: pretty; }

  /* Uniform H2 sizing across the site */
  .h2-uniform {
    font-size: 35px !important;
  }
  @media (max-width: 1024px) {
    .h2-uniform { font-size: 28px !important; }
  }
  @media (max-width: 720px) {
    .h2-uniform { font-size: 24px !important; }
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 22px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 999px;
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-deep); }
  .btn-primary:active { background: var(--accent-deep); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: var(--accent-deep); }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--line-2);
  }
  .btn-ghost:hover { border-color: var(--ink); background: rgba(0,0,0,0.03); }

  .btn .arrow { transition: transform 0.3s ease; }
  .btn:hover .arrow { transform: translateX(3px); }

  section { position: relative; }
  .section-pad { padding: 40px 0; }
  @media (max-width: 720px) { .section-pad { padding: 40px 0; } }

  .tweaks-panel {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    background: white;
    border: 1px solid var(--line-2);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow-lg);
    width: 260px;
    font-size: 13px;
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-panel h4 {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    color: var(--ink-mute);
  }
  .tweaks-panel .tweak-row { margin-bottom: 12px; }
  .tweaks-panel label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 12px; }
  .tweaks-panel .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .tweaks-panel .chip {
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid var(--line-2);
    font-size: 11px;
    background: white;
    cursor: pointer;
  }
  .tweaks-panel .chip.active { background: var(--ink); color: white; border-color: var(--ink); }

  .bubbles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(186,226,250,0.25));
    border: 1px solid rgba(29, 172, 243, 0.35);
    opacity: 0.65;
    animation: floatBubble linear infinite;
  }
  @keyframes floatBubble {
    0% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-30px) translateX(15px); }
    100% { transform: translateY(0) translateX(0); }
  }

  .leaf {
    position: absolute;
    color: var(--leaf);
    animation: floatLeaf 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes floatLeaf {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    50% { transform: rotate(12deg) translateY(-10px); }
  }

  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .reveal.in { opacity: 1; transform: translateY(0); }

  #root { min-height: 100vh; }
  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: var(--font-mono); color: var(--ink-mute); font-size: 13px;
  }
</style>
</head>
<body>
  <div id="root"><div class="loading">Chargement…</div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/common.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/header.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/hero.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/services.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/process.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/about.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/why.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/gallery.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/faq.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/quote.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/footer.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/tweaks.jsx" data-presets="react"></script>
  <script type="text/babel" src="src/app.jsx" data-presets="react"></script>
</body>
</html>
